services:
  uploader:
    image: localhost/uploader:full-test
    container_name: paperless-uploader-full-test
    environment:
      - SAMBA_ENABLED=true
      - FTP_ENABLED=true
      - WEBDAV_ENABLED=true
      - API_UPLOADER_ENABLED=true
      - PAPERLESS_URL=http://mock-api:8080
      - PAPERLESS_TOKEN=smoke-test-token
      - PUID=1000
      - PGID=1000
      - CONSUMPTION_DIR=/consumption
      - ARCHIVE_DIR=/archive
    ports:
      - "8081:8080" # WebDAV
      - "1445:445" # Samba
      - "2021:21" # FTP
    volumes:
      - ./integration-data/consumption:/consumption
      - ./integration-data/archive:/archive
    depends_on:
      - mock-api

  mock-api:
    image: python:3.11-alpine
    command: python /app/server.py
    volumes:
      - ./mock-api/server.py:/app/server.py
    ports:
      - "8080:8080"
