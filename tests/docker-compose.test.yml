services:
  uploader:
    image: localhost/uploader:test
    environment:
      - SAMBA_ENABLED=false # Simplify for integration test
      - FTP_ENABLED=false
      - WSDD_ENABLED=false
      - API_UPLOADER_ENABLED=true
      - API_UPLOADER_ON_SUCCESS=${API_UPLOADER_ON_SUCCESS:-delete}
      - PAPERLESS_URL=http://mock-api:8080
      - PAPERLESS_TOKEN=test-token
      - PUID=1000
      - PGID=1000
      - CONSUMPTION_DIR=/consumption
      - ARCHIVE_DIR=/archive
    volumes:
      - ./integration-data/consumption:/consumption
      - ./integration-data/archive:/archive
    depends_on:
      - mock-api

  mock-api:
    image: python:3.11-alpine
    command: python /app/server.py
    volumes:
      - ./mock-api/server.py:/app/server.py
    ports:
      - "8080:8080"
