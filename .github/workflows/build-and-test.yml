name: Build and Test

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run integration tests
        run: |
          ./tests/run-integration-tests.sh --build

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        flavor: [full, lightweight]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract service versions
        if: matrix.flavor == 'full'
        id: versions
        run: |
          SAMBA_VER=$(docker run --rm alpine:3.19 sh -c "apk add --no-cache samba >/dev/null && smbd --version" | awk '{print $2}')
          VSFTPD_VER=$(docker run --rm alpine:3.19 sh -c "apk add --no-cache vsftpd >/dev/null && apk list --installed vsftpd" | awk '{print $1}' | sed 's/vsftpd-//')
          WSDD_VER=$(docker run --rm alpine:3.19 sh -c "apk add --no-cache wsdd >/dev/null && wsdd --version" | head -n 1 | awk -F', v' '{print $2}')
          echo "samba=$SAMBA_VER" >> $GITHUB_OUTPUT
          echo "vsftpd=$VSFTPD_VER" >> $GITHUB_OUTPUT
          echo "wsdd=$WSDD_VER" >> $GITHUB_OUTPUT
          echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ matrix.flavor == 'full' }}
            type=raw,value=${{ matrix.flavor }},enable=true
            type=ref,event=branch,suffix=-${{ matrix.flavor }}
            type=semver,pattern={{version}},suffix=-${{ matrix.flavor }}
            type=sha,suffix=-${{ matrix.flavor }}

      - name: Build and push final image
        uses: docker/build-push-action@v7
        with:
          context: uploader
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            FLAVOR=${{ matrix.flavor }}
            SAMBA_VERSION=${{ steps.versions.outputs.samba || 'unknown' }}
            VSFTPD_VERSION=${{ steps.versions.outputs.vsftpd || 'unknown' }}
            WSDD_VERSION=${{ steps.versions.outputs.wsdd || 'unknown' }}
            BUILD_DATE=${{ steps.versions.outputs.date || 'unknown' }}
            REPO_REF=${{ github.ref_name }}
            REPO_COMMIT=${{ github.sha }}
            GITHUB_REPOSITORY=${{ github.repository }}
